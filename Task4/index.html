<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Form | Get in Touch</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: Arial, Helvetica, sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      /* Wrapper for better control */
      .container {
        width: 100%;
        max-width: 480px; /* 🔥 Reduced width for better proportion */
      }

      h1 {
        color: white;
        text-align: center;
        margin-bottom: 20px;
        font-size: 1.9rem;
      }

      form {
        background: white;
        border-radius: 20px; /* 🔥 reduced from 32px */
        padding: 28px 24px; /* 🔥 reduced padding */
        box-shadow: 0 15px 30px rgba(0, 0, 0, 0.2);
      }

      .form-group {
        margin-bottom: 18px; /* 🔥 tighter spacing */
      }

      label {
        display: block;
        font-weight: 600;
        margin-bottom: 6px;
        font-size: 0.95rem;
        color: #333;
      }

      input,
      textarea {
        width: 100%;
        padding: 10px 12px; /* 🔥 reduced height */
        font-size: 0.95rem;
        border: 1.5px solid #ddd;
        border-radius: 10px; /* 🔥 reduced */
        transition: 0.2s;
      }

      input:focus,
      textarea:focus {
        outline: none;
        border-color: #6c63ff;
        box-shadow: 0 0 0 2px rgba(108, 99, 255, 0.2);
      }

      textarea {
        resize: vertical;
        min-height: 90px; /* 🔥 reduced height */
      }

      button {
        width: 100%;
        padding: 12px;
        font-size: 1rem;
        border: none;
        border-radius: 25px;
        background: linear-gradient(95deg, #6c63ff, #5a54e8);
        color: white;
        cursor: pointer;
        transition: 0.3s;
      }

      button:hover {
        transform: translateY(-1px);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      }

      /* Responsive */
      @media (max-width: 500px) {
        .container {
          max-width: 100%;
        }

        form {
          padding: 20px;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Contact Details</h1>

      <form onsubmit="return validateForm();" novalidate>
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="John Carter" />
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="hello@example.com" />
        </div>

        <div class="form-group">
          <label for="phone">Phone Number</label>
          <input type="tel" id="phone" placeholder="+91 98765 43210" />
        </div>

        <div class="form-group">
          <label for="msg">Message</label>
          <textarea id="msg" placeholder="How can we help you?"></textarea>
        </div>

        <button type="submit">Send Message</button>
      </form>
    </div>

    <script>
      function validateForm() {
        let name = document.getElementById("name").value.trim();
        let email = document.getElementById("email").value.trim();
        let phone = document.getElementById("phone").value.trim();
        let msg = document.getElementById("msg").value.trim();

        let emailPattern = /^[^\s@]+@([^\s@]+\.)+[a-zA-Z]{2,}$/;

        if (!name) {
          alert("Enter your full name");
          return false;
        }

        if (!email || !emailPattern.test(email)) {
          alert("Enter valid email");
          return false;
        }

        if (!phone) {
          alert("Enter phone number");
          return false;
        }

        if (!msg) {
          alert("Enter message");
          return false;
        }

        alert("Form submitted successfully!");
        return true;
      }
    </script>
  </body>
</html>
