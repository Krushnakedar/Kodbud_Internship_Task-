<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Google</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: arial, sans-serif;
        background: #fff;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .navbar {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        padding: 14px 20px;
        gap: 16px;
        font-size: 13px;
      }

      .nav-links {
        display: flex;
        gap: 16px;
        align-items: center;
      }

      .nav-links a {
        text-decoration: none;
        color: #202124;
      }

      .nav-links a:hover {
        text-decoration: underline;
      }

      .nav-icons {
        display: flex;
        align-items: center;
        gap: 18px;
      }

      .nav-icons i {
        font-size: 20px;
        color: #5f6368;
        cursor: pointer;
      }

      .nav-icons i:hover {
        color: #202124;
      }

      .avatar {
        background-color: #9aa0a6;
        border-radius: 50%;
        width: 32px;
        height: 32px;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
      }

      .avatar i {
        font-size: 24px;
        color: white;
      }

      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      .logo {
        margin-bottom: 28px;
      }

      .logo img {
        width: 272px;
        height: auto;
        object-fit: contain;
      }

      .search-container {
        width: 100%;
        max-width: 584px;
        margin: 0 auto;
      }

      .search-bar {
        display: flex;
        align-items: center;
        border: 1px solid #dfe1e5;
        border-radius: 24px;
        padding: 5px 8px 5px 14px;
        background: white;
        transition: box-shadow 0.2s;
      }

      .search-bar:hover,
      .search-bar:focus-within {
        box-shadow: 0 1px 6px rgba(32, 33, 36, 0.28);
        border-color: rgba(223, 225, 229, 0);
      }

      .search-icon {
        color: #9aa0a6;
        font-size: 18px;
        margin-right: 12px;
      }

      .search-bar input {
        flex: 1;
        border: none;
        outline: none;
        font-size: 16px;
        padding: 12px 0;
        background: transparent;
        font-family: arial, sans-serif;
      }

      .search-tools {
        display: flex;
        align-items: center;
        gap: 12px;
        margin-left: 8px;
      }

      .search-tools i {
        font-size: 20px;
        color: #5f6368;
        cursor: pointer;
      }

      .ai-mode {
        display: flex;
        align-items: center;
        background: #f1f3f4;
        border-radius: 20px;
        padding: 5px 10px;
        gap: 6px;
        font-size: 14px;
        font-weight: 500;
        color: #1f1f1f;
        cursor: pointer;
        transition: background 0.2s;
      }

      .ai-mode i {
        font-size: 14px;
        margin: 0;
      }

      .ai-mode:hover {
        background: #e8eaed;
      }

      .search-buttons {
        display: flex;
        justify-content: center;
        gap: 12px;
        margin-top: 28px;
      }

      .search-buttons input {
        background-color: #f8f9fa;
        border: 1px solid #f8f9fa;
        border-radius: 4px;
        color: #3c4043;
        font-size: 14px;
        padding: 0 16px;
        height: 36px;
        cursor: pointer;
        transition: all 0.2s;
        font-family: arial, sans-serif;
      }

      .search-buttons input:hover {
        box-shadow: 0 1px 1px rgba(0, 0, 0, 0.1);
        background-color: #f8f9fa;
        border-color: #dadce0;
      }

      .languages {
        text-align: center;
        margin-top: 32px;
        font-size: 13px;
      }

      .languages span {
        color: #3c4043;
      }

      .languages a {
        text-decoration: none;
        color: #1a0dab;
        margin: 0 5px;
      }

      .languages a:hover {
        text-decoration: underline;
      }

      .footer {
        background-color: #f2f2f2;
        margin-top: auto;
      }

      .footer-country {
        padding: 15px 30px;
        font-size: 15px;
        color: #70757a;
        border-bottom: 1px solid #dadce0;
      }

      .footer-links {
        display: flex;
        flex-wrap: wrap;
        justify-content: space-between;
        padding: 15px 30px;
        font-size: 14px;
      }

      .footer-left,
      .footer-right {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
      }

      .footer-links a {
        text-decoration: none;
        color: #70757a;
      }

      .footer-links a:hover {
        text-decoration: underline;
      }

      @media (max-width: 650px) {
        .logo img {
          width: 200px;
        }
        .search-bar input {
          font-size: 14px;
        }
        .footer-links {
          flex-direction: column;
          align-items: center;
          gap: 15px;
        }
        .footer-left,
        .footer-right {
          justify-content: center;
        }
        .languages a {
          display: inline-block;
          margin: 4px;
        }
        .ai-mode span {
          display: none;
        }
        .ai-mode {
          padding: 5px 8px;
        }
      }

      @media (max-width: 480px) {
        .navbar {
          padding: 10px 12px;
        }
        .nav-links {
          gap: 10px;
        }
        .search-buttons {
          flex-direction: column;
          align-items: center;
        }
      }
    </style>
  </head>
  <body>
    <div class="navbar">
      <div class="nav-links">
        <a href="#">Gmail</a>
        <a href="#">Images</a>
      </div>
      <div class="nav-icons">
        <i class="fa-regular fa-flask"></i>
        <i class="fa-solid fa-grip-vertical"></i>
        <div class="avatar">
          <i class="fa-solid fa-circle-user"></i>
        </div>
      </div>
    </div>

    <div class="main">
      <div class="logo">
        <img
          src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_272x92dp.png"
          alt="Google"
        />
      </div>

      <div class="search-container">
        <div class="search-bar">
          <i class="fa-solid fa-magnifying-glass search-icon"></i>
          <input type="text" placeholder="Search Google or type a URL" />
          <div class="search-tools">
            <i class="fa-solid fa-microphone"></i>
            <i class="fa-regular fa-camera"></i>
            <div class="ai-mode">
              <i class="fa-solid fa-flask"></i>
              <span>AI Mode</span>
            </div>
          </div>
        </div>

        <div class="search-buttons">
          <input type="button" value="Google Search" />
          <input type="button" value="I'm Feeling Lucky" />
        </div>
      </div>

      <div class="languages">
        <span>Google offered in: </span>
        <a href="#">हिन्दी</a>
        <a href="#">বাংলা</a>
        <a href="#">తెలుగు</a>
        <a href="#">मराठी</a>
        <a href="#">தமிழ்</a>
        <a href="#">ગુજરાતી</a>
        <a href="#">ಕನ್ನಡ</a>
        <a href="#">മലയാളം</a>
        <a href="#">ਪੰਜਾਬੀ</a>
      </div>
    </div>

    <div class="footer">
      <div class="footer-country">India</div>
      <div class="footer-links">
        <div class="footer-left">
          <a href="#">Advertising</a>
          <a href="#">Business</a>
          <a href="#">How Search Works</a>
        </div>
        <div class="footer-right">
          <a href="#">Privacy</a>
          <a href="#">Terms</a>
          <a href="#">Settings</a>
        </div>
      </div>
    </div>
  </body>
</html>
